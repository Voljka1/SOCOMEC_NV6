modules:
    os:
        hardware: SOCOMECUPS6-MIB::upsIdentModel.0
        version:  SOCOMECUPS6-MIB::upsIdentAgentSoftwareVersion.0
        version_regex: '/v(?<version>[0-9]+.[0-9]+)/'
        serial:   SOCOMECUPS6-MIB::upsIdentUpsSerialNumber.0
    sensors:
        voltage:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsBattery
                    value: SOCOMECUPS6-MIB::upsBatteryVoltage
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.2.5.{{ $index }}'
                    descr: 'Battery #{{ $index }} Voltage'
                    index: 'upsBatteryVoltage.{{ $index }}'
                    divisor: 10
                -
                    oid: SOCOMECUPS6-MIB::upsBypass
                    value: SOCOMECUPS6-MIB::upsBypassVoltage
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.5.3.1.2.{{ $index }}'
                    descr: 'Bypass #{{ $index }} Voltage'
                    index: 'upsBypassVoltage.{{ $index }}'
                    divisor: 10
                -
                    oid: SOCOMECUPS6-MIB::upsInput
                    value: SOCOMECUPS6-MIB::upsInputVoltage
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.3.3.1.2.{{ $index }}'
                    descr: 'Input #{{ $index }} Voltage'
                    index: 'upsInputVoltage.{{ $index }}'
                    divisor: 10
                    low_limit: 200
                    low_warn_limit: 210
                    warn_limit: 235
                    high_limit: 240
                -
                    oid: SOCOMECUPS6-MIB::upsOutput
                    value: SOCOMECUPS6-MIB::upsOutputVoltage
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.4.4.1.2.{{ $index }}'
                    descr: 'Output #{{ $index }} Voltage'
                    index: 'upsOutputVoltage.{{ $index }}'
                    divisor: 10
        current:
            data:
                
                -
                    oid: SOCOMECUPS6-MIB::upsBypass
                    value: SOCOMECUPS6-MIB::upsBypassCurrent
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.5.3.1.3.{{ $index }}'
                    descr: 'Bypass #{{ $index }} Current'
                    index: 'upsBypassCurrent.{{ $index }}'
                    divisor: 10
                    skip_values:
                        -
                            oid: SOCOMECUPS6-MIB::upsBypassCurrent
                            op: '>'
                            value: 32767
                -
                    oid: SOCOMECUPS6-MIB::upsInput
                    value: SOCOMECUPS6-MIB::upsInputCurrent
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.3.3.1.3.{{ $index }}'
                    descr: 'Input #{{ $index }} Current'
                    index: 'upsInputCurrent.{{ $index }}'
                    divisor: 10
                    skip_values:
                        -
                            oid: SOCOMECUPS6-MIB::upsInputCurrent
                            op: '>'
                            value: 32767
                -
                    oid: SOCOMECUPS6-MIB::upsOutput
                    value: SOCOMECUPS6-MIB::upsOutputCurrent
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.4.4.1.3.{{ $index }}'
                    descr: 'Output #{{ $index }} Current'
                    index: 'upsOutputCurrent.{{ $index }}'
                    divisor: 10
                    skip_values:
                        -
                            oid: SOCOMECUPS6-MIB::upsOutputCurrent
                            op: '>'
                            value: 32767
        load:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsOutput
                    value: SOCOMECUPS6-MIB::upsOutputPercentLoad
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.4.4.1.4.{{ $index }}'
                    descr: 'Output #{{ $index }} Load'
                    index: 'upsOutputPercentLoad.{{ $index }}'
        frequency:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsBypass
                    value: SOCOMECUPS6-MIB::upsBypassFrequency
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.5.1.{{ $index }}'
                    descr: 'Bypass #{{ $index }} Frequency'
                    index: 'upsBypassFrequency.{{ $index }}'
                    divisor: 1
                    low_limit: 47.5
                    high_limit: 52.5
                -
                    oid: SOCOMECUPS6-MIB::upsInput
                    value: SOCOMECUPS6-MIB::upsInputFrequency
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.3.2.{{ $index }}'
                    descr: 'Input #{{ $index }} Frequency'
                    index: 'upsInputFrequency.{{ $index }}'
                    divisor: 10
                    low_limit: 47.5
                    high_limit: 52.5
                -
                    oid: SOCOMECUPS6-MIB::upsOutput
                    value: SOCOMECUPS6-MIB::upsOutputFrequency
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.4.2.{{ $index }}'
                    descr: 'Output #{{ $index }} Frequency'
                    index: 'upsOutputFrequency.{{ $index }}'
                    divisor: 10
                    low_limit: 47.5
                    high_limit: 52.5
        temperature:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsBattery
                    value: SOCOMECUPS6-MIB::upsBatteryTemperature
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.2.6.{{ $index }}'
                    descr: 'Battery #{{ $index }} Temperature'
                    index: 'upsBatteryTemperature.{{ $index }}'
                    divisor: 1
                    skip_values:
                        -
                            oid: SOCOMECUPS6-MIB::upsBatteryTemperature
                            op: '='
                            value: 0
                -
                    oid: SOCOMECUPS6-MIB::emdStatus
                    value: SOCOMECUPS6-MIB::emdStatusTemperature
                    num_oid:  '.1.3.6.1.4.1.4555.1.1.1.1.11.1.{{ $index }}'
                    descr: 'External EMD Temperature'
                    index: 'emdStatusTemperature.{{ $index }}'
                    divisor: 10
                    low_limit: 10       # Critical Low
                    low_warn_limit: 15  # Warning Low
                    warn_limit: 30      # Warning High
                    high_limit: 36      # Critical High
        humidity:
            data:
                -
                    oid: SOCOMECUPS6-MIB::emdStatus
                    value: SOCOMECUPS6-MIB::emdStatusHumidity
                    num_oid:  '.1.3.6.1.4.1.4555.1.1.1.1.11.2.{{ $index }}'
                    descr: 'External EMD Humidity'
                    index: 'emdStatusHumidity.{{ $index }}'
                    divisor: 10
                    low_limit: 15       # Critical Low
                    low_warn_limit: 20  # Warning Low
                    warn_limit: 70      # Warning High
                    high_limit: 90      # Critical High
        runtime:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsBattery
                    value: SOCOMECUPS6-MIB::upsEstimatedMinutesRemaining
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.2.3.{{ $index }}'
                    descr: 'Battery #{{ $index }} Minutes remaining'
                    index: 'upsEstimatedMinutesRemaining.{{ $index }}'
                -
                    oid: SOCOMECUPS6-MIB::upsBattery
                    value: SOCOMECUPS6-MIB::upsSecondsOnBattery
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.2.2.{{ $index }}'
                    descr: 'Battery #{{ $index }} Runtime seconds'
                    index: 'upsSecondsOnBattery.{{ $index }}'
        charge:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsBattery
                    value: SOCOMECUPS6-MIB::upsEstimatedChargeRemaining
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.2.4.{{ $index }}'
                    descr: 'Battery #{{ $index }} Charge remaining'
                    index: 'upsEstimatedChargeRemaining.{{ $index }}'
                    unit: '%'
                    low_limit: 20
                    low_warn_limit: 30
        state:
            data:
                -
                    oid: SOCOMECUPS6-MIB::upsBattery
                    value: SOCOMECUPS6-MIB::upsBatteryStatus
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.2.1.{{ $index }}'
                    descr: 'Battery #{{ $index }} Status'
                    index: 'upsBatteryStatus.{{ $index }}'
                    state_name: upsBatteryStatus
                    states:
                        - { value: 1, generic: 3, graph: 1, descr: 'Unknown' }
                        - { value: 2, generic: 0, graph: 1, descr: 'Normal' }
                        - { value: 3, generic: 1, graph: 1, descr: 'Low' }
                        - { value: 4, generic: 2, graph: 1, descr: 'Depleted' }
                        - { value: 5, generic: 1, graph: 1, descr: 'Discharging' }
                        - { value: 6, generic: 2, graph: 1, descr: 'Failure' }
                        - { value: 7, generic: 2, graph: 1, descr: 'Disconnected' }
                -
                    oid: SOCOMECUPS6-MIB::upsOutput
                    value: SOCOMECUPS6-MIB::upsOutputSource
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.4.1.{{ $index }}'
                    descr: 'Output #{{ $index }} Source'
                    index: 'upsOutputSource.{{ $index }}'
                    state_name: upsOutputSource
                    states:
                        - { value: 1, generic: 3, graph: 1, descr: 'Unknown' }
                        - { value: 2, generic: 0, graph: 1, descr: 'on Inverter' }
                        - { value: 3, generic: 0, graph: 1, descr: 'on Mains' }
                        - { value: 4, generic: 0, graph: 1, descr: 'ECO mode' }
                        - { value: 5, generic: 1, graph: 1, descr: 'on Bypass' }
                        - { value: 6, generic: 0, graph: 1, descr: 'on Standby' }
                        - { value: 7, generic: 1, graph: 1, descr: 'on Maintenance Bypass' }
                        - { value: 8, generic: 2, graph: 1, descr: 'UPS Off' }
                        - { value: 9, generic: 0, graph: 1, descr: 'Normal mode' }
                -
                    oid: SOCOMECUPS6-MIB::upsAlarm
                    value: SOCOMECUPS6-MIB::upsAlarmOutputOverload
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.6.3.8.{{ $index }}'
                    descr: 'Output #{{ $index }} Overload'
                    index: 'upsAlarmOutputOverload.{{ $index }}'
                    group: Alarm
                    state_name: upsAlarmOutputOverload
                    states:
                        - { value: 0, generic: 0, graph: 1, descr: 'OK' }
                        - { value: 1, generic: 2, graph: 1, descr: 'Alarm' }
                -
                    oid: SOCOMECUPS6-MIB::upsAlarm
                    value: SOCOMECUPS6-MIB::upsAlarmTempBad
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.6.3.5.{{ $index }}'
                    descr: 'Temperature #{{ $index }} Out of tolerance'
                    index: 'upsAlarmTempBad.{{ $index }}'
                    group: Alarm
                    state_name: upsAlarmTempBad
                    states:
                        - { value: 0, generic: 0, graph: 1, descr: 'OK' }
                        - { value: 1, generic: 2, graph: 1, descr: 'Alarm' }
                -
                    oid: SOCOMECUPS6-MIB::upsAlarm
                    value: SOCOMECUPS6-MIB::upsAlarmRectifierGeneralAlarm
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.6.3.42.{{ $index }}'
                    descr: 'Rectifier #{{ $index }} general alarm'
                    index: 'upsAlarmRectifierAlarm.{{ $index }}'
                    group: Alarm
                    state_name: upsAlarmRectifierGeneralAlarm
                    states:
                        - { value: 0, generic: 0, graph: 1, descr: 'OK' }
                        - { value: 1, generic: 2, graph: 1, descr: 'Alarm' }
                -
                    oid: SOCOMECUPS6-MIB::upsAlarm
                    value: SOCOMECUPS6-MIB::upsAlarmFansFailure
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.6.3.79.{{ $index }}'
                    descr: 'Fan #{{ $index }} Failure'
                    index: 'upsAlarmFansFailure.{{ $index }}'
                    group: Alarm
                    state_name: upsAlarmFansFailure
                    states:
                        - { value: 0, generic: 0, graph: 1, descr: 'OK' }
                        - { value: 1, generic: 2, graph: 1, descr: 'Alarm' }
                -
                    oid: SOCOMECUPS6-MIB::upsAlarm
                    value: SOCOMECUPS6-MIB::upsAlarmGeneralFault
                    num_oid: '.1.3.6.1.4.1.4555.1.1.1.1.6.3.18.{{ $index }}'
                    descr: ' A general fault in the UPS has been detected.'
                    index: 'upsAlarmGeneralFault.{{ $index }}'
                    group: Alarm
                    state_name: upsAlarmGeneralFault
                    states:
                        - { value: 0, generic: 0, graph: 1, descr: 'OK' }
                        - { value: 1, generic: 2, graph: 1, descr: 'Alarm' }
